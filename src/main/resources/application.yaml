server:
  port: ${PORT:8080}

spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: book_finder

  datasource:
    # Use Railway's URL if present, otherwise fall back to your local Docker DB
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bf_database}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expirationMs: ${JWT_EXPIRATION_MS:86400000}

aws:
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_S3_BUCKET}