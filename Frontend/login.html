<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book-Finder Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./auth.css">
</head>

<body>
    <div class="page-wrapper">
        <div class="form-container">
            <h1>Login</h1>
            <form id="loginForm">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your Username" required>

                <div class="label-row">
                    <label>Password</label>
                    <a href="#" class="auth-link">forgot password</a>
                </div>
                
                <input type="password" id="password" placeholder="Enter Password" required>

                <button type="submit">Sign In</button>
            </form>

            <div class="form-footer">
                <p>Or</p>
                <p>Have an account? <a href="signup.html" class="auth-link-bold">Sign Up</a></p>
            </div>
        </div>

        <div class="image-container">
            <img src="./svg_files/bookfinder logo.svg" alt="Book Finder Logo">
        </div>
    </div>

    <div class="bottom-decor-bar">
        <div class="decor-segment seg-1"></div>
        <div class="decor-segment seg-2"></div>
        <div class="decor-segment seg-3"></div>
        <div class="decor-segment seg-4"></div>
    </div>

    <script src="login.js"></script>
</body>

</html>
