<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookFinder | Create a Book</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- styles -->
  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/navbar.css" />

  <link rel="stylesheet" href="./createbook.css" />
  <!-- components -->
  <script src="components/navbar.js" defer></script>
 
</head>

<body class="cb-body">
 <bf-navbar active="mybooks"></bf-navbar>

  <!-- Page -->
  <main class="cb-main">
    <div class="cb-wrap">

      <!-- Left: Cover -->
      <section class="cb-cover" aria-label="Cover upload">
        <div class="cb-cover-box">
          <div class="cb-cover-icon" aria-hidden="true">
            <!-- image placeholder -->
            <svg viewBox="0 0 24 24" width="44" height="44" fill="none">
              <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-11Z" stroke="currentColor" stroke-width="2"/>
              <path d="M9 10a2 2 0 1 0 0-4a2 2 0 0 0 0 4Z" fill="currentColor"/>
              <path d="M5.5 18l5.2-5.2a1.5 1.5 0 0 1 2.1 0L18.5 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>

          <p class="cb-cover-text">Add a cover</p>

          <label class="cb-cover-btn">
            Upload
            <input type="file" accept="image/*" hidden />
          </label>

          <button class="cb-help-dot" type="button" aria-label="Cover help">i</button>
        </div>
      </section>

      <!-- Right: Form -->
      <section class="cb-card" aria-label="Story details form">
        <div class="cb-card-inner">
          <h2 class="cb-card-title">Story Details</h2>
          <div class="cb-divider"></div>

          <form class="cb-form">

            <div class="cb-field">
              <label class="cb-label" for="title">Title</label>
              <input id="title" class="cb-input" type="text" placeholder="Untitled Story" />
            </div>

            <div class="cb-field">
              <div class="cb-label-row">
                <label class="cb-label" for="desc">Description</label>
                <span class="cb-info" title="Tell readers what your story is about">i</span>
              </div>
              <textarea id="desc" class="cb-textarea" placeholder=""></textarea>
            </div>

            <div class="cb-field">
              <div class="cb-label-row">
                <label class="cb-label" for="char">Main Characters</label>
                <span class="cb-info" title="Add your main characters">i</span>
              </div>

              <div class="cb-inline">
                <input id="char" class="cb-input" type="text" placeholder="Name" />
                <button class="cb-plus" type="button" aria-label="Add character">+</button>
              </div>
            </div>

            <div class="cb-row">
              <div class="cb-field">
                <div class="cb-label-row">
                  <label class="cb-label" for="category">Category</label>
                  <span class="cb-info" title="Choose a category">i</span>
                </div>
                <select id="category" class="cb-select">
                  <option selected disabled>Select a category</option>
                  <option>Fantasy</option>
                  <option>Romance</option>
                  <option>Horror</option>
                  <option>Sci-Fi</option>
                </select>
              </div>

              <div class="cb-field">
                <div class="cb-label-row">
                  <label class="cb-label" for="tags">Tags</label>
                  <span class="cb-info" title="Add tags to help discovery">i</span>
                </div>
                <button class="cb-tag-btn" type="button" id="tags">Add a tag +</button>
              </div>
            </div>

            <div class="cb-row">
              <div class="cb-field">
                <div class="cb-label-row">
                  <label class="cb-label" for="audience">Target Audience</label>
                  <span class="cb-info" title="Who is this for?">i</span>
                </div>
                <select id="audience" class="cb-select">
                  <option selected disabled>Who is your primary audience?</option>
                  <option>Young Adult</option>
                  <option>Adult</option>
                  <option>Children</option>
                  <option>All Ages</option>
                </select>
              </div>

              <div class="cb-field">
                <div class="cb-label-row">
                  <label class="cb-label" for="lang">Language</label>
                  <span class="cb-info" title="Choose language">i</span>
                </div>
                <select id="lang" class="cb-select">
                  <option selected>English</option>
                  <option>Spanish</option>
                  <option>French</option>
                </select>
              </div>
            </div>

            <div class="cb-actions">
              <button class="cb-next" type="submit">Next →</button>
            </div>

          </form>
        </div>
      </section>

    </div>


  </main>
</body>
</html>
