<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookFinder | My Profile</title>
 <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- styles -->
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/navbar.css" />

    <link rel="stylesheet" href="profile.css"/>
    <!-- components -->
    <script src="components/navbar.js" defer></script>
</head>
<body>
    <bf-navbar active="home"></bf-navbar>

  <div class="page-container">

    <!-- profile header -->
    <div class="profile-header">
      <div class="avatar-wrap" id="profileAvatar">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="profile-info">
        <div class="profile-username" id="profileUsername">Username1</div>
        <div class="profile-fullname" id="profileFullname">Firstname Lastname</div>
        <hr class="profile-divider"/>
        <div class="profile-joined">Joined: <strong id="profileJoined">—</strong></div>
      </div>
    </div>

    <!-- bio -->
    <div class="bio-section">
      <div class="section-title">Bio</div>
      <p class="bio-text" id="profileBio">User hasn't created a bio</p>
    </div>

    <!-- books carousel -->
    <div class="books-section">
      <div class="section-title">Books Created by This Author</div>
      <div class="carousel-nav">
        <button class="carousel-btn" id="prevBtn" disabled>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <button class="carousel-btn" id="nextBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
      <div class="books-carousel-wrapper">
        <div class="books-track" id="booksTrack"></div>
      </div>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>

  </div>

  <script src="profile.js"></script>
</body>
</html>
